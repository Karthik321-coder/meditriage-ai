name: MediTriage CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./meditriage_ci.db
          RATE_LIMIT_PER_MINUTE: "2000"
          ALLOWED_ORIGINS: "*"
        run: |
          pytest -q tests
